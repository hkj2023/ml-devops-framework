name: ML DevOps Pipeline

on:
  push:
  pull_request:

jobs:
  pipeline:
    runs-on: ubuntu-latest

    steps:
      # ============================================
      # 1. Checkout code
      # ============================================
      - name: Checkout repo
        uses: actions/checkout@v4

      # ============================================
      # 2. Build Docker image
      # ============================================
      - name: Build Docker image
        run: docker build -t ml-pipeline .

      # ============================================
      # 3. Run anomaly detection
      # ============================================
      - name: Run Isolation Forest evaluation
        run: docker run --rm \-v ${{ github.workspace }}:/app \ml-pipeline\python tests/IsolationForestTest/if_eval.py
        

      # ============================================
      # 4. Run clustering analysis
      # ============================================
      - name: Run clustering analysis
        run: docker run --rm -v ${{ github.workspace }}:/app ml-pipeline python src/clustering.py

      # ============================================
      # 5. Evaluate model
      # ============================================
      - name: Evaluate model
        run: docker run --rm -v ${{ github.workspace }}:/app ml-pipeline python src/eval.py

      # ============================================
      # 6. Run inference
      # ============================================
      - name: Run inference
        run: docker run --rm -v ${{ github.workspace }}:/app ml-pipeline python src/inference.py

      # ============================================
      # 7. Run decision engine
      # ============================================
      - name: Run decision engine
        run: |
          docker run --rm -v ${{ github.workspace }}:/app ml-pipeline \
          python src/decision_engine.py > test_path.txt

      # ============================================
      # 8. Execute adaptive pytest
      # ============================================
      - name: Run adaptive tests
        run: |
          TEST_PATH=$(cat test_path.txt)
          docker run --rm -v ${{ github.workspace }}:/app ml-pipeline \
          pytest $TEST_PATH -v --json-report --json-report-file=results.json

      # ============================================
      # 9. Upload test results
      # ============================================
      - name: Upload test results
        uses: actions/upload-artifact@v4
        with:
          name: ml-test-results
          path: results.json

      # ============================================
      # 10. Upload ML outputs
      # ============================================
      - name: Upload ML outputs
        uses: actions/upload-artifact@v4
        with:
          name: ml-outputs
          path: |
            outputs/metrics.json
            outputs/risk_prediction.json
            outputs/anomaly_summary.json
            outputs/cluster_summary.json
            outputs/anomaly_results.csv
            outputs/cluster_results.csv