name: ML DevOps Pipeline

on:
  push:
  pull_request:

jobs:
  pipeline:
    runs-on: ubuntu-latest

    steps:
      - name: Checkout repo
        uses: actions/checkout@v4

      - name: Build Docker image
        run: docker build -t ml-pipeline .

      # ======================
      # RUN EVERYTHING INSIDE DOCKER
      # ======================

      - name: Run data prep
        run: docker run ml-pipeline python src/prep.py

      - name: Train model
        run: docker run ml-pipeline python src/train.py

      - name: Evaluate model
        run: docker run ml-pipeline python src/eval.py

      - name: Run tests (module1)
        run: docker run ml-pipeline pytest tests/test_module1.py -v --json-report --json-report-file=results.json
      - name: Upload test results
        uses: actions/upload-artifact@v3
        with:
          name: module1-test-results
          path: results.json
