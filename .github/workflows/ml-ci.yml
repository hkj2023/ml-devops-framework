name: ML DevOps Pipeline

on:
  push:
    branches: [ main ]
  pull_request:
    branches: [ main ]
  workflow_dispatch:

jobs:
  data-prep:
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4
      - name: Run Data Prep
        run: |
          docker build -t dataprep-app -f Dockerfile.prep .
          docker run --rm dataprep-app

  training:
    runs-on: ubuntu-latest
    needs: data-prep
    steps:
      - uses: actions/checkout@v4
      - name: Run Training
        run: |
          docker build -t randomforest-app -f Dockerfile.train .
          docker run --rm randomforest-app
      - name: Upload Model Artifact
        uses: actions/upload-artifact@v4
        with:
          name: model
          path: model.pkl

  evaluation:
    runs-on: ubuntu-latest
    needs: training
    steps:
      - uses: actions/checkout@v4
      - name: Run Evaluation
        run: |
          docker build -t eval-app -f Dockerfile.eval .
          docker run --rm eval-app
      - name: Upload Metrics
        uses: actions/upload-artifact@v4
        with:
          name: metrics
          path: metrics.json
