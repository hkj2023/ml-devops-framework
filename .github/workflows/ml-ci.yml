name: ML DevOps Pipeline

on:
  push:
  pull_request:

jobs:
  pipeline:
    runs-on: ubuntu-latest

    steps:
      # ============================================
      # 1. Checkout repo
      # ============================================
      - name: Checkout repo
        uses: actions/checkout@v4

      # ============================================
      # 2. Build Docker image
      # ============================================
      - name: Build Docker image
        run: docker build -t ml-pipeline .

      # ============================================
      # 3. Run Isolation Forest evaluation
      # ============================================
      - name: Run IF evaluation tests
        run: |
          docker run --rm \
            -v ${{ github.workspace }}:/app \
            ml-pipeline \
            pytest tests/IsolationForestTest/test_if_eval.py -v

      # ============================================
      # 4. Run Random Forest evaluation
      # ============================================
      - name: Run RF evaluation tests
        run: |
          docker run --rm \
            -v ${{ github.workspace }}:/app \
            ml-pipeline \
            pytest tests/RandomForestTest/test_rf_eval.py -v

      # ============================================
      # 5. Run Isolation Forest inference
      # ============================================
      - name: Run IF inference
        run: |
          docker run --rm \
            -v ${{ github.workspace }}:/app \
            ml-pipeline \
            python src/IsolationForest/if_inference.py

      # ============================================
      # 6. Run Random Forest inference
      # ============================================
      - name: Run RF inference
        run: |
          docker run --rm \
            -v ${{ github.workspace }}:/app \
            ml-pipeline \
            python src/RandomForest/rf_inference.py

      # ============================================
      # 7. Run Decision Engine
      # ============================================
      - name: Run Decision Engine
        run: |
          docker run --rm \
            -v ${{ github.workspace }}:/app \
            ml-pipeline \
            python src/decision_engine.py > outputs/decision.json

      # ============================================
      # 8. Upload artifacts
      # ============================================
      - name: Upload outputs
        uses: actions/upload-artifact@v4
        with:
          name: ml-outputs
          path: |
            outputs/*.json
            outputs/*.csv